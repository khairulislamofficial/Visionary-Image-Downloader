<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visionary Image Downloader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <img src="../assets/icons/icon32.png" alt="Logo" class="logo">
        <h1>Visionary</h1>
      </div>
      <div class="controls">
        <button id="select-all">Select All</button>
        <button id="deselect-all">Clear</button>
      </div>
    </header>

    <div class="filters">
      <div class="filter-group">
        <label for="min-width">Min Width (px)</label>
        <input type="number" id="min-width" placeholder="0" min="0">
      </div>
      <div class="filter-group">
        <label for="file-type">Format</label>
        <input type="text" id="file-type" placeholder="jpg, png...">
      </div>
      <div class="filter-group">
        <label for="rename-prefix">Rename Prefix</label>
        <input type="text" id="rename-prefix" placeholder="e.g. img_">
      </div>
      <div class="filter-group" style="justify-content: flex-end; display: flex; align-items: flex-end;">
        <button id="rescan-btn" style="width: 100%;">Re-scan</button>
      </div>
    </div>

    <div id="image-grid">
      <!-- Images will be injected here -->
      <div class="empty-state">
        <div class="spinner"></div>
        <p>Scanning page for images...</p>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <label>Total</label>
        <span id="total-count">0</span>
      </div>
      <div class="stat-item">
        <label>Selected</label>
        <span id="selected-count">0</span>
      </div>
      <div class="stat-item">
        <label>Total Size</label>
        <span id="total-size">0.0 MB</span>
      </div>
    </div>

    <div class="footer">
      <button id="download-btn" class="primary" style="flex: 1;">Download ZIP</button>
    </div>
  </div>

  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">Preparing your ZIP...</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
